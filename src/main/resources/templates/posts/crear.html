<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insertar</title>
    <!-- CSS de Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- CSS personalizado -->
    <!-- <link href="/estilos.css" rel="stylesheet" />-->
  </head>
  <body>
    <div class="container">
      <form th:action="@{/posts/crear}" th:object="${nuevo}" method="post">
        <div class="row mb-3">
          <label for="userId" class="form-label">Id del Usuario:</label>
          <input
            type="number"
            class="form-control"
            id="userId"
            name="userId"
            min="1"
            max="20"
            th:field="*{userId}"
            required
          />
        </div>
        <div class="row mb-3">
          <label for="titulo" class="form-label">Título del Post:</label>
          <input
            type="text"
            class="form-control"
            id="titulo"
            name="titulo"
            maxlength="25"
            th:field="*{titulo}"
            required
          />
        </div>
        <div class="row mb-3">
          <label for="cuerpo" class="form-label">Cuerpo del Post:</label>
          <textarea
            class="form-control"
            id="cuerpo"
            name="cuerpo"
            rows="5"
            cols="50"
            maxlength="250"
            th:field="*{cuerpo}"
            required
          >
          </textarea>
        </div>
        <div>
          <button type="submit" class="btn btn-primary col-4">
            Guardar Post
          </button>
        </div>
      </form>
    </div>
    <!-- JS de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
