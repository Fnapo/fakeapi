<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insertar</title>
    <!-- CSS de Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- CSS personalizado -->
    <!-- <link href="/estilos.css" rel="stylesheet" />-->
  </head>
  <body>
    <div class="container">
      <form
        th:action="@{/posts/actualizar}"
        th:object="${modificado}"
        method="post"
      >
        <input
          class="d-none"
          type="number"
          id="id"
          name="id"
          th:value="${modificado.getId()}"
        />
        <div class="row mb-3">
          <label for="userId" class="form-label">Id del Usuario:</label>
          <input
            type="number"
            class="form-control"
            id="userId"
            name="userId"
            min="1"
            max="20"
            th:field="*{userId}"
            required
          />
        </div>
        <div class="row mb-3">
          <label for="titulo" class="form-label">Título del Post:</label>
          <input
            type="text"
            class="form-control"
            id="titulo"
            name="titulo"
            maxlength="25"
            th:field="*{titulo}"
            required
          />
        </div>
        <div class="row mb-3">
          <label for="cuerpo" class="form-label">Cuerpo del Post:</label>
          <textarea
            class="form-control"
            id="cuerpo"
            name="cuerpo"
            rows="5"
            cols="50"
            maxlength="250"
            th:field="*{cuerpo}"
            required
          >
          </textarea>
        </div>
        <div class="d-flex justify-content-around">
          <button type="submit" class="btn btn-primary col-3">
            Guardar Post
          </button>
          <button type="reset" class="btn btn-success col-3">Resetear</button>
          <a class="btn btn-info col-3" th:href="@{/posts/todos}"
            >Listar Posts</a
          >
        </div>
      </form>
    </div>
    <!-- JS de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
