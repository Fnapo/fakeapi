<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listado</title>
    <!-- CSS de Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/estilos.css}" />
  </head>
  <body class="a-100 overflow-hidden">
    <div class="h-10p"></div>
    <div class="container h-90p overflow-y-auto">
      <table class="table table-striped table-responsive">
        <thead class="sticky-top">
          <tr>
            <th>Id Usuario</th>
            <th>Título</th>
            <th class="col-5">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="post : ${listado}">
            <td th:text="${post.getUserId()}">Id del Usuario</td>
            <td th:text="${post.getTitulo()}">Título del Post</td>
            <td>
              <div class="d-flex justify-content-around">
                <a
                  class="btn btn-primary col-3"
                  th:href="@{/posts/detalles/{id}(id=${post.getId()})}"
                  >Detalles</a
                ><!--@{/posts/actualizar/{id}(id=${post.getId()})}-->
                <a
                  class="btn btn-success col-3"
                  th:href="@{/posts/actualizar/{id}(id=${post.getId()})}"
                  >Actualizar</a
                >
                <a class="btn btn-danger col-3" href="#">Borrar</a>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- JS de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
